<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Club Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black-bg: #0a0a0a; 
            --card-bg: #161616;  
            --bright-blue: #00d2ff; 
            --neon-cyan: #3aedff;   
            --deep-ocean: #0077be;  
            --text-white: #ffffff;
        }

        body {
            /* Основной текст — сжатый и строгий */
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--black-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            letter-spacing: 0.5px;
        }

        header {
            background: linear-gradient(180deg, #001f3f 0%, var(--black-bg) 100%);
            border-bottom: 3px solid var(--bright-blue);
            padding: 4rem 1rem;
            text-align: center;
        }

        header h1 {
            /* Заголовок — острый и массивный */
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0px var(--deep-ocean), 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .container {
            max-width: 1100px;
            margin: -30px auto 40px; /* Немного «наезжаем» на шапку */
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 0; /* Делаем углы острыми */
            border-left: 4px solid var(--bright-blue);
            text-align: left; /* Строгий стиль */
            transition: 0.3s ease;
            cursor: pointer;
        }

        .card:hover { 
            background: #202020;
            border-left: 8px solid var(--neon-cyan);
            transform: translateX(10px);
        }

        .card h3 { 
            font-family: 'Oswald', sans-serif;
            color: var(--bright-blue); 
            margin-top: 0;
            font-size: 1.6rem;
            text-transform: uppercase;
        }

        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 0;
            border: 1px solid #222;
            border-top: 5px solid var(--bright-blue);
            height: fit-content;
        }

        .sidebar h3 {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .vote-section {
            text-align: center;
            background: #000;
            padding: 25px;
            border: 1px solid #333;
            margin-top: 20px;
        }

        button {
            font-family: 'Oswald', sans-serif;
            background: var(--bright-blue);
            color: #000; /* Черный текст на ярком фоне для контраста */
            border: none;
            padding: 15px;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        button:hover { 
            background: var(--white);
            background: var(--neon-cyan);
            box-shadow: 0 0 20px var(--bright-blue);
        }

        #counter { 
            font-family: 'Oswald', sans-serif;
            font-size: 4rem; 
            color: var(--text-white);
            line-height: 1;
            margin: 10px 0;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; margin-top: 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>FISHING ARSENAL</h1>
    <p style="text-transform: uppercase; letter-spacing: 2px; color: var(--bright-blue);">Личный кабинет рыболова</p>
</header>

<div class="container">
    <div class="main-content">
        <div class="card"><h3>Карп</h3><p>Трофеи и локации</p></div>
        <div class="card"><h3>Спиннинг</h3><p>Хищник и снасти</p></div>
        <div class="card"><h3>Зима</h3><p>Лед и тактика</p></div>
        <div class="card"><h3>Фидер</h3><p>Прикормки и точки</p></div>
        <div class="card" style="grid-column: span 2;"><h3>Справочник</h3><p>Полный список снаряжения</p></div>
    </div>

    <div class="sidebar">
        <h3>Планирование</h3>
        <p>СЛЕДУЮЩИЙ ВЫЕЗД: <b>04.03.2026</b></p>
        <div class="vote-section">
            <p>ГОТОВНОСТЬ ГРУППЫ:</p>
            <div id="counter">0</div>
            <p>УЧАСТНИКОВ</p>
            <button onclick="castVote()">ПОДТВЕРДИТЬ УЧАСТИЕ</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnDm7gHUkmtTb7xgcfpVgaxYLalfFqqwU",
    authDomain: "fishing-site-dd71b.firebaseapp.com",
    projectId: "fishing-site-dd71b",
    storageBucket: "fishing-site-dd71b.firebasestorage.app",
    messagingSenderId: "248599374195",
    appId: "1:248599374195:web:af91ab78aa187a608b7d06"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteDoc = doc(db, "siteData", "votes");

  onSnapshot(voteDoc, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('counter').innerText = docSnap.data().count;
    }
  });

  window.castVote = async function() {
    const docSnap = await getDoc(voteDoc);
    let currentCount = docSnap.exists() ? docSnap.data().count : 0;
    await setDoc(voteDoc, { count: currentCount + 1 });
  };
</script>

</body>
</html>
