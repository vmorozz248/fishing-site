<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Arsenal Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black-bg: #0a0a0a; 
            --card-bg: #161616;  
            --bright-blue: #00d2ff; 
            --neon-cyan: #3aedff;   
            --deep-ocean: #0077be;  
            --text-white: #ffffff;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--black-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            letter-spacing: 0.5px;
            overflow-x: hidden;
        }

        /* --- ШАПКА С АНИМАЦИЕЙ --- */
        header {
            background: linear-gradient(180deg, #001f3f 0%, var(--black-bg) 100%);
            border-bottom: 3px solid var(--bright-blue);
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .fishing-animation {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Анимация катушки */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Анимация лески (вибрация) */
        @keyframes tension {
            0% { stroke-dashoffset: 0; }
            50% { stroke-dashoffset: 2; }
            100% { stroke-dashoffset: 0; }
        }

        .reel {
            transform-origin: 35px 75px; /* Точка центра катушки */
            animation: spin 2s linear infinite;
        }

        .fishing-line {
            stroke-dasharray: 4;
            animation: tension 0.1s infinite linear;
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* --- ОСТАЛЬНЫЕ СТИЛИ --- */
        .container {
            max-width: 1100px;
            margin: -20px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            position: relative;
            z-index: 2;
        }

        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 0;
            border-left: 4px solid var(--bright-blue);
            text-align: left;
            transition: 0.3s ease;
            cursor: pointer;
        }

        .card:hover { 
            background: #202020;
            border-left: 10px solid var(--neon-cyan);
            transform: translateX(10px);
        }

        .card h3 { 
            font-family: 'Oswald', sans-serif;
            color: var(--bright-blue); 
            margin: 0 0 10px 0;
            font-size: 1.6rem;
            text-transform: uppercase;
        }

        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 0;
            border: 1px solid #222;
            border-top: 5px solid var(--bright-blue);
            height: fit-content;
        }

        .vote-section {
            text-align: center;
            background: #000;
            padding: 25px;
            border: 1px solid #333;
            margin-top: 20px;
        }

        button {
            font-family: 'Oswald', sans-serif;
            background: var(--bright-blue);
            color: #000;
            border: none;
            padding: 15px;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        button:hover { 
            background: var(--neon-cyan);
            box-shadow: 0 0 20px var(--bright-blue);
        }

        #counter { 
            font-family: 'Oswald', sans-serif;
            font-size: 4rem; 
            color: var(--text-white);
            margin: 10px 0;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; margin-top: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="fishing-animation">
        <svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 90L180 20" stroke="#555" stroke-width="4" stroke-linecap="round"/>
            <g class="reel">
                <circle cx="35" silver cy="75" r="12" stroke="var(--bright-blue)" stroke-width="3" fill="#222"/>
                <line x1="35" y1="65" x2="35" y2="85" stroke="var(--bright-blue)" stroke-width="2"/>
                <line x1="25" y1="75" x2="45" y2="75" stroke="var(--bright-blue)" stroke-width="2"/>
            </g>
            <path class="fishing-line" d="M180 20L195 95" stroke="white" stroke-width="1" opacity="0.6"/>
        </svg>
    </div>
    <h1>FISHING ARSENAL</h1>
    <p style="text-transform: uppercase; letter-spacing: 2px; color: var(--bright-blue); margin: 5px 0 0 0;">Твой личный центр управления</p>
</header>

<div class="container">
    <div class="main-content">
        <div class="card"><h3>Карп</h3><p>Трофеи и локации</p></div>
        <div class="card"><h3>Спиннинг</h3><p>Хищник и снасти</p></div>
        <div class="card"><h3>Зима</h3><p>Лед и тактика</p></div>
        <div class="card"><h3>Фидер</h3><p>Прикормки и точки</p></div>
        <div class="card" style="grid-column: span 2;"><h3>Справочник</h3><p>Полный список снаряжения</p></div>
    </div>

    <div class="sidebar">
        <h3 style="font-family: 'Oswald'; text-transform: uppercase;">Планирование</h3>
        <p>БЛИЖАЙШИЙ ВЫЕЗД: <b>04.03.2026</b></p>
        <div class="vote-section">
            <p>ГОТОВНОСТЬ ГРУППЫ:</p>
            <div id="counter">0</div>
            <p>УЧАСТНИКОВ</p>
            <button onclick="castVote()">ПОДТВЕРДИТЬ УЧАСТИЕ</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnDm7gHUkmtTb7xgcfpVgaxYLalfFqqwU",
    authDomain: "fishing-site-dd71b.firebaseapp.com",
    projectId: "fishing-site-dd71b",
    storageBucket: "fishing-site-dd71b.firebasestorage.app",
    messagingSenderId: "248599374195",
    appId: "1:248599374195:web:af91ab78aa187a608b7d06"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteDoc = doc(db, "siteData", "votes");

  onSnapshot(voteDoc, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('counter').innerText = docSnap.data().count;
    }
  });

  window.castVote = async function() {
    const docSnap = await getDoc(voteDoc);
    let currentCount = docSnap.exists() ? docSnap.data().count : 0;
    await setDoc(voteDoc, { count: currentCount + 1 });
  };
</script>

</body>
</html>
