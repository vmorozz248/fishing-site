<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Arsenal 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --black-bg: #050505; 
            --card-bg: #111111;  
            --bright-blue: #00d2ff; 
            --neon-cyan: #3aedff;   
            --text-white: #ffffff;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--black-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- 3D КОНТЕЙНЕР ШАПКИ --- */
        #header-3d {
            width: 100%;
            height: 450px;
            background: radial-gradient(circle at center, #001f3f 0%, #050505 100%);
            position: relative;
            border-bottom: 2px solid var(--bright-blue);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        .header-overlay {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .header-overlay p {
            font-family: 'Oswald';
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--bright-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* --- КОНТЕНТ --- */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 30px;
            border-left: 4px solid var(--bright-blue);
            transition: 0.3s ease;
            cursor: pointer;
        }

        .card:hover { 
            background: #1a1a1a;
            border-left: 10px solid var(--neon-cyan);
            transform: scale(1.02);
        }

        .card h3 { 
            font-family: 'Oswald', sans-serif;
            color: var(--bright-blue); 
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-top: 5px solid var(--bright-blue);
        }

        button {
            font-family: 'Oswald';
            background: var(--bright-blue);
            color: #000;
            border: none;
            padding: 15px;
            text-transform: uppercase;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }

        #counter { font-family: 'Oswald'; font-size: 4rem; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div id="header-3d">
    <div id="canvas-container"></div>
    <div class="header-overlay">
        <p>Нажми на экран, чтобы подсечь!</p>
    </div>
</div>

<div class="container">
    <div class="main-content">
        <div class="card"><h3>Карп</h3><p>Трофеи и локации</p></div>
        <div class="card"><h3>Спиннинг</h3><p>Хищник и снасти</p></div>
        <div class="card"><h3>Зима</h3><p>Лед и тактика</p></div>
        <div class="card"><h3>Фидер</h3><p>Прикормки и точки</p></div>
        <div class="card" style="grid-column: span 2;"><h3>Справочник</h3><p>Полный список снаряжения</p></div>
    </div>

    <div class="sidebar">
        <h3>ПЛАНИРОВАНИЕ</h3>
        <div id="counter">0</div>
        <button onclick="castVote()">ПОДТВЕРДИТЬ УЧАСТИЕ</button>
    </div>
</div>

<script type="module">
    // --- 3D ЛОГИКА ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Освещение
    const light = new THREE.PointLight(0x00d2ff, 1, 100);
    light.position.set(0, 10, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Создаем "Удочку" (простой цилиндр под углом)
    const rodGeometry = new THREE.CylinderGeometry(0.2, 0.5, 15, 32);
    const rodMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const rod = new THREE.Mesh(rodGeometry, rodMaterial);
    rod.rotation.z = Math.PI / 4;
    rod.position.set(-5, -2, 0);
    scene.add(rod);

    // Создаем "Текст" (как спрайт, чтобы вылетал)
    const loader = new THREE.FontLoader();
    // Мы используем упрощенный метод через Canvas для текста, чтобы не грузить тяжелые шрифты
    function createTextTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#00d2ff';
        ctx.font = 'Bold 120px Oswald';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00d2ff';
        ctx.fillText('FISHING ARSENAL', 512, 150);
        return new THREE.CanvasTexture(canvas);
    }

    const textGeo = new THREE.PlaneGeometry(10, 2.5);
    const textMat = new THREE.MeshBasicMaterial({ map: createTextTexture(), transparent: true, opacity: 0 });
    const textMesh = new THREE.Mesh(textGeo, textMat);
    textMesh.position.set(5, -10, 2); // Спрятан внизу
    scene.add(textMesh);

    camera.position.z = 12;

    // Анимация вытягивания
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.02;

        // Покачивание удочки
        rod.rotation.x = Math.sin(time) * 0.05;
        
        // Появление текста (вылетает снизу)
        if (textMesh.position.y < 2) {
            textMesh.position.y += 0.1;
            textMesh.opacity = Math.min(textMat.opacity + 0.01, 1);
            textMat.opacity = textMesh.opacity;
        }

        renderer.render(scene, camera);
    }
    animate();

    // Обработка изменения размера окна
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnDm7gHUkmtTb7xgcfpVgaxYLalfFqqwU",
    authDomain: "fishing-site-dd71b.firebaseapp.com",
    projectId: "fishing-site-dd71b",
    storageBucket: "fishing-site-dd71b.firebasestorage.app",
    messagingSenderId: "248599374195",
    appId: "1:248599374195:web:af91ab78aa187a608b7d06"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteDoc = doc(db, "siteData", "votes");

  onSnapshot(voteDoc, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('counter').innerText = docSnap.data().count;
    }
  });

  window.castVote = async function() {
    const docSnap = await getDoc(voteDoc);
    let currentCount = docSnap.exists() ? docSnap.data().count : 0;
    await setDoc(voteDoc, { count: currentCount + 1 });
  };
</script>

</body>
</html>
