<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Arsenal | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black-bg: #050505; 
            --card-bg: #111111;  
            --bright-blue: #00d2ff; 
            --neon-cyan: #3aedff;   
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--black-bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- ШАПКА С РЕАЛИСТИЧНОЙ УДОЧКОЙ --- */
        header {
            height: 450px;
            background: radial-gradient(circle at 30% 50%, #001a33 0%, var(--black-bg) 100%);
            border-bottom: 3px solid var(--bright-blue);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Сама удочка из твоего файла */
        .fishing-rod {
            position: absolute;
            left: -50px;
            bottom: -100px;
            width: 600px; /* Размер подбираем под экран */
            transform: rotate(-15deg);
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            animation: rod-vibration 2s infinite ease-in-out;
            transform-origin: bottom left;
        }

        /* Текст, который "вытягиваем" */
        .title-wrap {
            position: relative;
            z-index: 3;
            animation: pull-up 4s forwards cubic-bezier(0.17, 0.67, 0.83, 0.67);
            text-align: center;
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 5rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 8px;
            color: white;
            text-shadow: 0 0 30px var(--bright-blue);
        }

        /* Леска */
        .fishing-line {
            position: absolute;
            top: 50px; /* Точка схода у кончика удочки */
            left: 450px;
            width: 2px;
            height: 1000px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 1;
            transform: rotate(-55deg);
            transform-origin: top left;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        /* Анимация вибрации удочки (поклёвка) */
        @keyframes rod-vibration {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(-17deg); }
            70% { transform: rotate(-14deg); }
        }

        /* Анимация вытягивания названия */
        @keyframes pull-up {
            0% { transform: translateY(500px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* --- КОНТЕНТ --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 35px;
            border-left: 5px solid var(--bright-blue);
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover { 
            background: #1a1a1a;
            border-left: 12px solid var(--neon-cyan);
            transform: scale(1.02);
        }

        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-top: 6px solid var(--bright-blue);
        }

        button {
            font-family: 'Oswald';
            background: var(--bright-blue);
            color: #000;
            border: none;
            padding: 18px;
            text-transform: uppercase;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        #counter { font-family: 'Oswald'; font-size: 4.5rem; text-align: center; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .fishing-rod { width: 300px; left: -20px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <img src="image_e69e84.png" class="fishing-rod" alt="Fishing Rod">
    
    <div class="fishing-line"></div>

    <div class="title-wrap">
        <h1>FISHING ARSENAL</h1>
        <p style="font-family: 'Oswald'; color: var(--bright-blue); letter-spacing: 5px;">PREMIUM MANAGEMENT</p>
    </div>
</header>

<div class="container">
    <div class="main-content">
        <div class="card"><h3>Карп</h3><p>Точки и трофеи</p></div>
        <div class="card"><h3>Спиннинг</h3><p>Хищник и снасти</p></div>
        <div class="card"><h3>Зима</h3><p>Тактика лова</p></div>
        <div class="card"><h3>Фидер</h3><p>Дистанции и смеси</p></div>
        <div class="card" style="grid-column: span 2;"><h3>Справочник</h3><p>Ваш арсенал</p></div>
    </div>

    <div class="sidebar">
        <h3>КТО ЕДЕТ?</h3>
        <div id="counter">0</div>
        <button onclick="castVote()">Я В ДЕЛЕ!</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnDm7gHUkmtTb7xgcfpVgaxYLalfFqqwU",
    authDomain: "fishing-site-dd71b.firebaseapp.com",
    projectId: "fishing-site-dd71b",
    storageBucket: "fishing-site-dd71b.firebasestorage.app",
    messagingSenderId: "248599374195",
    appId: "1:248599374195:web:af91ab78aa187a608b7d06"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteDoc = doc(db, "siteData", "votes");

  onSnapshot(voteDoc, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('counter').innerText = docSnap.data().count;
    }
  });

  window.castVote = async function() {
    const docSnap = await getDoc(voteDoc);
    let currentCount = docSnap.exists() ? docSnap.data().count : 0;
    await setDoc(voteDoc, { count: currentCount + 1 });
  };
</script>

</body>
</html>
