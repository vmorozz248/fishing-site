<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Arsenal 3D Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --black-bg: #050505; 
            --bright-blue: #00d2ff; 
            --neon-cyan: #3aedff;   
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--black-bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Контейнер для 3D */
        #header-3d {
            width: 100%;
            height: 400px;
            position: relative;
            background: black;
            border-bottom: 2px solid var(--bright-blue);
            cursor: pointer;
        }

        /* Текстовый слой (если 3D не подгрузится, будет запасной вариант) */
        .title-backup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald';
            font-size: 4rem;
            color: var(--bright-blue);
            text-shadow: 0 0 20px var(--bright-blue);
            pointer-events: none;
            display: none; /* Включаем, если Three.js упадет */
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        .card {
            background: #111;
            padding: 25px;
            border-left: 4px solid var(--bright-blue);
            margin-bottom: 15px;
            font-family: 'Oswald';
            text-transform: uppercase;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--bright-blue);
            border: none;
            font-family: 'Oswald';
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="header-3d" onclick="hook()">
    <div class="title-backup" id="backup">FISHING ARSENAL</div>
</div>

<div class="container">
    <div class="main-content">
        <div class="card">Карповая рыбалка</div>
        <div class="card">Спиннинг</div>
        <div class="card">Зимняя рыбалка</div>
        <div class="card">Фидерная рыбалка</div>
        <div class="card">Справочник снастей</div>
    </div>
    <div class="sidebar">
        <div class="card" style="text-align: center;">
            <div id="counter" style="font-size: 3rem;">0</div>
            <p>УЧАСТНИКОВ</p>
            <button onclick="castVote()">Я ЕДУ!</button>
        </div>
    </div>
</div>

<script>
    // --- ИСПРАВЛЕННЫЙ 3D СКРИПТ ---
    let scene, camera, renderer, rod, line, textMesh;
    let isHooked = false;

    function init() {
        const container = document.getElementById('header-3d');
        scene = new THREE.Scene();
        
        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 2, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Свет
        const light = new THREE.PointLight(0x00d2ff, 1.5, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Удочка
        const rodGeo = new THREE.CylinderGeometry(0.05, 0.15, 12, 12);
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        rod = new THREE.Mesh(rodGeo, rodMat);
        rod.rotation.z = Math.PI / 3;
        rod.position.set(-6, 0, 0);
        scene.add(rod);

        // Леска
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        const points = [new THREE.Vector3(-3, 4.5, 0), new THREE.Vector3(0, -10, 0)];
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // Текст (через Sprite для надежности)
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024; canvas.height = 256;
        ctx.fillStyle = '#00d2ff';
        ctx.font = 'bold 100px Oswald';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00d2ff';
        ctx.fillText('FISHING ARSENAL', 512, 150);
        
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture });
        textMesh = new THREE.Sprite(spriteMat);
        textMesh.scale.set(12, 3, 1);
        textMesh.position.set(0, -8, 0); // Скрыт внизу
        scene.add(textMesh);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if (isHooked && textMesh.position.y < 1) {
            // Анимация подсечки
            rod.rotation.z += (Math.PI/6 - rod.rotation.z) * 0.1;
            textMesh.position.y += 0.2;
            
            // Обновление лески
            const positions = line.geometry.attributes.position.array;
            positions[3] = textMesh.position.x;
            positions[4] = textMesh.position.y + 0.5;
            line.geometry.attributes.position.needsUpdate = true;
        } else if (!isHooked) {
            rod.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;
        }

        renderer.render(scene, camera);
    }

    // Функция "Подсечки" при клике на шапку
    window.hook = function() {
        isHooked = true;
    }

    init();

    // Ресайз
    window.addEventListener('resize', () => {
        const container = document.getElementById('header-3d');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnDm7gHUkmtTb7xgcfpVgaxYLalfFqqwU",
    authDomain: "fishing-site-dd71b.firebaseapp.com",
    projectId: "fishing-site-dd71b",
    storageBucket: "fishing-site-dd71b.firebasestorage.app",
    messagingSenderId: "248599374195",
    appId: "1:248599374195:web:af91ab78aa187a608b7d06"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteDoc = doc(db, "siteData", "votes");

  onSnapshot(voteDoc, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('counter').innerText = docSnap.data().count;
    }
  });

  window.castVote = async function() {
    const docSnap = await getDoc(voteDoc);
    let currentCount = docSnap.exists() ? docSnap.data().count : 0;
    await setDoc(voteDoc, { count: currentCount + 1 });
  };
</script>

</body>
</html>
