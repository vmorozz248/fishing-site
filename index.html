<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Club Premium</title>
    <style>
        :root {
            --black-bg: #121212; /* Глубокий черный */
            --card-bg: #1e1e1e;  /* Темно-серый для карточек */
            --bright-blue: #00d2ff; /* Яркий голубой */
            --neon-cyan: #3aedff;   /* Неоновый бирюзовый */
            --deep-ocean: #0077be;  /* Насыщенный синий */
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--black-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #004e92, #000428); /* Глубокий градиент */
            border-bottom: 2px solid var(--bright-blue);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }

        header h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--bright-blue);
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-top: 4px solid var(--neon-cyan); /* Яркая полоса сверху */
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .card:hover { 
            transform: scale(1.05);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(58, 237, 255, 0.3);
            background: #252525;
        }

        .card h3 { 
            color: var(--neon-cyan); 
            margin-top: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card p { color: #bbb; }

        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: fit-content;
        }

        .vote-section {
            text-align: center;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 15px;
            border: 1px dashed var(--bright-blue);
            margin-top: 20px;
        }

        button {
            background: linear-gradient(90deg, var(--deep-ocean), var(--bright-blue));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }

        button:hover { 
            filter: brightness(1.2);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
        }

        #counter { 
            font-size: 3rem; 
            color: var(--bright-blue); 
            font-weight: bold; 
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.6);
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎣 FISHING CLUB PREMIER</h1>
    <p>Личный онлайн-центр управления рыбалкой</p>
</header>

<div class="container">
    <div class="main-content">
        <div class="card"><h3>Карп</h3><p>Трофеи и прикормки</p></div>
        <div class="card"><h3>Спиннинг</h3><p>Джиг, твичинг, блесны</p></div>
        <div class="card"><h3>Зима</h3><p>Мормышка и балансиры</p></div>
        <div class="card"><h3>Фидер</h3><p>Реки и водохранилища</p></div>
        <div class="card" style="grid-column: span 2;"><h3>Справочник снастей</h3><p>Инвентаризация арсенала</p></div>
    </div>

    <div class="sidebar">
        <h3 style="color: var(--bright-blue)">Планирование</h3>
        <p>Следующий выезд: <b>Март 2026</b></p>
        <div class="vote-section">
            <p>Кто в деле?</p>
            <div id="counter">0</div>
            <p>рыбаков</p>
            <button onclick="castVote()">Я ЕДУ! 🎣</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAnDm7gHUkmtTb7xgcfpVgaxYLalfFqqwU",
    authDomain: "fishing-site-dd71b.firebaseapp.com",
    projectId: "fishing-site-dd71b",
    storageBucket: "fishing-site-dd71b.firebasestorage.app",
    messagingSenderId: "248599374195",
    appId: "1:248599374195:web:af91ab78aa187a608b7d06"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteDoc = doc(db, "siteData", "votes");

  onSnapshot(voteDoc, (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('counter').innerText = docSnap.data().count;
    }
  });

  window.castVote = async function() {
    const docSnap = await getDoc(voteDoc);
    let currentCount = docSnap.exists() ? docSnap.data().count : 0;
    await setDoc(voteDoc, { count: currentCount + 1 });
  };
</script>

</body>
</html>
